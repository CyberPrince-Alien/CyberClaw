# CyberClaw Configuration — v0.2.0
# All new options are shown commented-out. Uncomment to enable.

llm:
  default_provider: gemini
  temperature: 0.7
  max_tokens: 2048
  enable_failover: true
  providers:
    - id: openai
      provider: openai
      model: gpt-4
      api_key: sk-your-openai-api-key-here
      priority: 1
      enabled: false

    - id: gemini
      provider: gemini
      model: gemini-2.5-flash
      api_key: AIzaSyCBBO-hBho9_k8DoiNuKThrJHPrfiR92Rk
      priority: 1
      enabled: true

    - id: openrouter
      provider: openrouter
      model: openai/gpt-4o-mini
      api_key: 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
      api_base: https://openrouter.ai/api/v1
      priority: 2
      enabled: false

    - id: groq
      provider: groq
      model: llama-3.3-70b-versatile
      api_key: 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
      priority: 3
      enabled: true

    - id: nvidia
      provider: nvidia_nim
      model: meta/llama-3.1-8b-instruct
      api_key: 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
      priority: 4
      enabled: false

default_agent: cyberclaw

