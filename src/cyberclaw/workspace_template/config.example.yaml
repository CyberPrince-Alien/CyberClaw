# CyberClaw Configuration File
# Full docs: https://cyberprince-alien.github.io/CyberClaw/
# Providers follow LiteLLM format: https://docs.litellm.ai/docs/providers

llm:
  default_provider: openai
  temperature: 0.7
  max_tokens: 2048
  enable_failover: true

  providers:
    - id: openai
      provider: openai
      model: gpt-4o-mini
      api_key: sk-your-openai-api-key-here
      priority: 1
      enabled: true

    - id: anthropic
      provider: anthropic
      model: claude-3-5-sonnet-20241022
      api_key: sk-ant-your-anthropic-api-key-here
      priority: 2
      enabled: false

    - id: gemini
      provider: gemini
      model: gemini-2.5-flash
      api_key: your-gemini-api-key-here
      priority: 3
      enabled: false

    - id: groq
      provider: groq
      model: llama-3.3-70b-versatile
      api_key: gsk-your-groq-api-key-here
      priority: 4
      enabled: false

    - id: deepseek
      provider: deepseek
      model: deepseek-chat
      api_key: sk-your-deepseek-api-key-here
      priority: 5
      enabled: false

    - id: openrouter
      provider: openrouter
      model: openai/gpt-4o-mini
      api_key: sk-or-your-openrouter-api-key-here
      api_base: https://openrouter.ai/api/v1
      priority: 6
      enabled: false

    - id: nvidia
      provider: nvidia_nim
      model: meta/llama-3.1-8b-instruct
      api_key: nvapi-your-nvidia-api-key-here
      priority: 7
      enabled: false

    - id: ollama
      provider: ollama
      model: llama3
      api_key: ollama
      api_base: http://localhost:11434
      priority: 8
      enabled: false

default_agent: cyberclaw

api:
  host: 127.0.0.1
  port: 8000

