version: "3.9"

services:
  cyberclaw:
    build: .
    container_name: cyberclaw
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/app/workspace
    environment:
      - CYBERCLAW_WORKSPACE=/app/workspace
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
